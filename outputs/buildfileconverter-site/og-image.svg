<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="ogTitle ogDesc">
  <title id="ogTitle">BuildFileConverter - PoE2 .build file checker</title>
  <desc id="ogDesc">Open graph image for BuildFileConverter showing a build file validation console.</desc>
  <defs>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0v42" fill="none" stroke="#2f3828" stroke-width="1"/>
    </pattern>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#caff3f" stop-opacity=".22"/>
      <stop offset="1" stop-color="#7fb5c8" stop-opacity=".08"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="#151613"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity=".75"/>
  <circle cx="930" cy="148" r="330" fill="url(#glow)"/>
  <rect x="72" y="64" width="92" height="92" rx="10" fill="#21231e" stroke="#caff3f" stroke-width="5"/>
  <path d="M100 82h38l14 14v38h-52z" fill="#151613" stroke="#caff3f" stroke-width="4" stroke-linejoin="round"/>
  <path d="M138 82v14h14" fill="none" stroke="#caff3f" stroke-width="4" stroke-linejoin="round"/>
  <text x="126" y="123" text-anchor="middle" fill="#caff3f" font-family="Menlo, Consolas, monospace" font-size="24" font-weight="900">BF</text>
  <text x="190" y="116" fill="#f2f0e8" font-family="Menlo, Consolas, monospace" font-size="34" font-weight="900">BuildFileConverter</text>
  <text x="72" y="232" fill="#caff3f" font-family="Menlo, Consolas, monospace" font-size="28" font-weight="900">POE2 .BUILD CONVERTER</text>
  <text x="72" y="330" fill="#f2f0e8" font-family="Menlo, Consolas, monospace" font-size="70" font-weight="900">Check build files</text>
  <text x="72" y="408" fill="#f2f0e8" font-family="Menlo, Consolas, monospace" font-size="70" font-weight="900">before import.</text>
  <text x="76" y="492" fill="#b7b0a4" font-family="Menlo, Consolas, monospace" font-size="28">Browser-side validator, import paths, templates.</text>
  <g transform="translate(780 234)">
    <rect width="296" height="214" fill="#21231e" stroke="#46483f" stroke-width="2"/>
    <rect x="24" y="26" width="248" height="48" fill="#11120f" stroke="#caff3f" stroke-width="2"/>
    <rect x="42" y="41" width="16" height="16" fill="#7ed97a"/>
    <text x="74" y="58" fill="#f2f0e8" font-family="Menlo, Consolas, monospace" font-size="18" font-weight="900">Looks parseable</text>
    <text x="24" y="116" fill="#7d7569" font-family="Menlo, Consolas, monospace" font-size="14">KEYS</text>
    <text x="24" y="148" fill="#caff3f" font-family="Menlo, Consolas, monospace" font-size="20">game, class, skills</text>
    <text x="24" y="188" fill="#7fb5c8" font-family="Menlo, Consolas, monospace" font-size="17">0 server uploads</text>
  </g>
</svg>
