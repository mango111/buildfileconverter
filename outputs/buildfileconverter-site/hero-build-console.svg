<svg xmlns="http://www.w3.org/2000/svg" width="920" height="680" viewBox="0 0 920 680" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Build file validation console</title>
  <desc id="heroDesc">A stylized build file console showing a JSON build file, validation status, import paths, and a normalized file output.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#2b2d27"/>
      <stop offset="1" stop-color="#151613"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#000000" flood-opacity=".45"/>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0v36" fill="none" stroke="#3b4433" stroke-width="1" opacity=".65"/>
    </pattern>
  </defs>
  <rect width="920" height="680" fill="#151613"/>
  <rect width="920" height="680" fill="url(#grid)" opacity=".72"/>
  <circle cx="732" cy="142" r="250" fill="#caff3f" opacity=".08"/>
  <g filter="url(#shadow)">
    <rect x="70" y="72" width="780" height="512" fill="url(#panel)" stroke="#46483f" stroke-width="2"/>
    <rect x="70" y="72" width="780" height="52" fill="#11120f" stroke="#46483f" stroke-width="2"/>
    <circle cx="101" cy="98" r="7" fill="#ff6e5b"/>
    <circle cx="127" cy="98" r="7" fill="#d88954"/>
    <circle cx="153" cy="98" r="7" fill="#7ed97a"/>
    <text x="190" y="105" fill="#b7b0a4" font-family="Menlo, Consolas, monospace" font-size="18">buildfileconverter://poe2.build/check</text>

    <rect x="104" y="156" width="360" height="344" fill="#11120f" stroke="#46483f" stroke-width="2"/>
    <text x="130" y="196" fill="#caff3f" font-family="Menlo, Consolas, monospace" font-size="21" font-weight="900">sample-poe2.build</text>
    <text x="130" y="244" fill="#7fb5c8" font-family="Menlo, Consolas, monospace" font-size="22">{</text>
    <text x="160" y="282" fill="#f2f0e8" font-family="Menlo, Consolas, monospace" font-size="22">"game": "poe2",</text>
    <text x="160" y="320" fill="#f2f0e8" font-family="Menlo, Consolas, monospace" font-size="22">"class": "Mercenary",</text>
    <text x="160" y="358" fill="#f2f0e8" font-family="Menlo, Consolas, monospace" font-size="22">"skills": [</text>
    <text x="190" y="396" fill="#caff3f" font-family="Menlo, Consolas, monospace" font-size="22">"Explosive Shot"</text>
    <text x="160" y="434" fill="#f2f0e8" font-family="Menlo, Consolas, monospace" font-size="22">]</text>
    <text x="130" y="472" fill="#7fb5c8" font-family="Menlo, Consolas, monospace" font-size="22">}</text>

    <rect x="502" y="156" width="314" height="92" fill="#171812" stroke="#caff3f" stroke-width="2"/>
    <rect x="526" y="190" width="18" height="18" fill="#7ed97a"/>
    <text x="562" y="207" fill="#f2f0e8" font-family="Menlo, Consolas, monospace" font-size="22" font-weight="900">Looks parseable</text>
    <text x="526" y="231" fill="#b7b0a4" font-family="Menlo, Consolas, monospace" font-size="15">normalized in browser</text>

    <rect x="502" y="280" width="314" height="116" fill="#21231e" stroke="#46483f" stroke-width="2"/>
    <text x="526" y="318" fill="#7d7569" font-family="Menlo, Consolas, monospace" font-size="15" font-weight="900">TOP-LEVEL KEYS</text>
    <text x="526" y="356" fill="#caff3f" font-family="Menlo, Consolas, monospace" font-size="22">game, class, skills</text>

    <rect x="502" y="428" width="314" height="72" fill="#11120f" stroke="#7fb5c8" stroke-width="2"/>
    <text x="526" y="472" fill="#7fb5c8" font-family="Menlo, Consolas, monospace" font-size="21">/Path of Exile 2/Builds</text>
  </g>
</svg>
